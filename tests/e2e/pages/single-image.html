<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Image Trail E2E Single Image</title>
    <link rel="stylesheet" href="./assets.css" />
  </head>
  <body>
    <main>
      <picture>
        <source id="fixture-primary-source" media="(max-width: 1px)" srcset="./assets/asset-three.svg" sizes="180px" />
        <img
          id="fixture-primary-image"
          alt="Single E2E fixture"
          width="180"
          height="120"
          src="./assets/asset-one.svg"
          srcset="./assets/asset-one.svg 1x"
          sizes="180px"
          style="background: rgb(255, 255, 255); object-fit: contain;"
        />
      </picture>
    </main>
  </body>
</html>
