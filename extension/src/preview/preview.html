<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Image Trail Preview</title>
    <style>
      :root {
        color-scheme: dark;
        background: #111;
        color: #eee;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      img {
        display: block;
        max-width: 100vw;
        max-height: 100vh;
        object-fit: contain;
      }

      p {
        max-width: 42rem;
        padding: 1rem;
      }
    </style>
  </head>
  <body>
    <p id="status">Loading encrypted preview...</p>
    <script src="./preview.js"></script>
  </body>
</html>
