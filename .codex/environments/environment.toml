# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "image-trail"

[setup]
script = '''
set -u

echo "==> Codex cleanup starting"

# Run from repo root when possible.
if git rev-parse --show-toplevel >/dev/null 2>&1; then
  cd "$(git rev-parse --show-toplevel)"
fi

echo "==> Working directory: $(pwd)"

# Stop Docker Compose resources if this repo uses Compose.
# Keep this best-effort so cleanup does not fail because Docker is closed.
if command -v docker >/dev/null 2>&1; then
  if [ -f "compose.yaml" ] || [ -f "compose.yml" ] || [ -f "docker-compose.yaml" ] || [ -f "docker-compose.yml" ]; then
    echo "==> Stopping Docker Compose resources"
    docker compose down --remove-orphans || true
  fi
fi

# Remove transient project-local output.
# Do not remove source files, lockfiles, package manifests, or repo config.
echo "==> Removing transient outputs"

rm -rf \
  .cache/tmp \
  tmp \
  temp \
  .tmp \
  dist \
  extension/dist \
  .test-dist \
  build \
  coverage \
  playwright-report \
  test-results \
  .nyc_output \
  .parcel-cache \
  .vite \
  .turbo \
  .next/cache \
  .eslintcache \
  tsconfig.tsbuildinfo

# Remove OS/editor noise.
find . \
  \( -name ".DS_Store" -o -name "Thumbs.db" -o -name "*.swp" -o -name "*.swo" \) \
  -type f \
  -delete 2>/dev/null || true

echo "==> Codex cleanup complete"

exit 0
'''

[cleanup]
script = '''
set -u

if git rev-parse --show-toplevel >/dev/null 2>&1; then
  cd "$(git rev-parse --show-toplevel)"
fi

rm -rf \
  .cache/tmp \
  dist \
  extension/dist \
  .test-dist \
  build \
  coverage \
  playwright-report \
  test-results

exit 0
'''
