# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "image-trail"

[setup]
script = '''
set -Eeuo pipefail

echo "==> Codex setup starting"

# Codex should already run from the checked-out repo, but this keeps it safe.
if git rev-parse --show-toplevel >/dev/null 2>&1; then
  cd "$(git rev-parse --show-toplevel)"
fi

echo "==> Working directory: $(pwd)"

# Load nvm explicitly because setup scripts are non-interactive shells.
export NVM_DIR="${NVM_DIR:-$HOME/.nvm}"

if [ -s "$NVM_DIR/nvm.sh" ]; then
  . "$NVM_DIR/nvm.sh"
else
  echo "ERROR: nvm not found at $NVM_DIR/nvm.sh"
  exit 1
fi

if [ ! -f ".nvmrc" ]; then
  echo "ERROR: .nvmrc not found in repo root."
  exit 1
fi

echo "==> Installing/using Node from .nvmrc: $(cat .nvmrc)"
nvm install
nvm use

echo "==> Node: $(node --version)"
echo "==> npm:  $(npm --version)"

# Useful for packageManager entries like pnpm@x or yarn@x.
if command -v corepack >/dev/null 2>&1; then
  echo "==> Enabling Corepack"
  corepack enable || true
fi

# Deterministic package install based on lockfile.
if [ -f "pnpm-lock.yaml" ]; then
  echo "==> Installing dependencies with pnpm"
  corepack prepare pnpm@latest --activate >/dev/null 2>&1 || true
  pnpm install --frozen-lockfile
elif [ -f "yarn.lock" ]; then
  echo "==> Installing dependencies with yarn"
  yarn install --frozen-lockfile
elif [ -f "package-lock.json" ] || [ -f "npm-shrinkwrap.json" ]; then
  echo "==> Installing dependencies with npm ci"
  npm ci --no-audit --no-fund
elif [ -f "package.json" ]; then
  echo "==> Installing dependencies with npm install"
  npm install
else
  echo "==> No package.json found; skipping dependency install"
fi

# Browser automation support, only when Playwright is present.
if [ -f "package.json" ] && grep -qi '"@playwright/test"\|"playwright"' package.json; then
  echo "==> Playwright detected; installing Chromium (with system deps for fresh containers)"
  npx playwright install --with-deps chromium || npx playwright install chromium || true
fi

# Initial build is deliberately FATAL: a broken build should fail setup loudly instead of
# wasting the session, and extension/dist/build-info.json must exist for the AGENTS.md
# build-identity footer.
if [ -f "package.json" ] && npm run | grep -qE '^\s+build$'; then
  echo "==> build script detected; running initial build"
  npm run build
fi

echo "==> Codex setup complete"
'''

[cleanup]
script = '''
set -u

echo "==> Codex cleanup starting"

# Run from repo root when possible.
if git rev-parse --show-toplevel >/dev/null 2>&1; then
  cd "$(git rev-parse --show-toplevel)"
fi

echo "==> Working directory: $(pwd)"

# Stop Docker Compose resources if this repo uses Compose.
# Keep this best-effort so cleanup does not fail because Docker is closed.
if command -v docker >/dev/null 2>&1; then
  if [ -f "compose.yaml" ] || [ -f "compose.yml" ] || [ -f "docker-compose.yaml" ] || [ -f "docker-compose.yml" ]; then
    echo "==> Stopping Docker Compose resources"
    docker compose down --remove-orphans || true
  fi
fi

# Remove transient project-local output.
# Do not remove source files, lockfiles, package manifests, or repo config.
echo "==> Removing transient outputs"

rm -rf \
  .cache/tmp \
  tmp \
  temp \
  .tmp \
  dist \
  extension/dist \
  .test-dist \
  build \
  coverage \
  playwright-report \
  test-results \
  .nyc_output \
  .parcel-cache \
  .vite \
  .turbo \
  .next/cache \
  .eslintcache \
  tsconfig.tsbuildinfo

# Remove OS/editor noise.
find . \
  \( -name ".DS_Store" -o -name "Thumbs.db" -o -name "*.swp" -o -name "*.swo" \) \
  -type f \
  -delete 2>/dev/null || true

echo "==> Codex cleanup complete"

exit 0
'''
