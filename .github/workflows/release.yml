name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing exact v<package-version> tag to package and release'
        required: true
        type: string

concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

# Normally dispatched by version-cut.yml after it creates the version tag. The tag trigger also
# covers tags pushed by humans; workflow_dispatch is the recovery path for GITHUB_TOKEN tags,
# whose pushes do not trigger another workflow. Every build checks out the tag, never main.
# This workflow packages and publishes GitHub Release assets only. It does not merge version
# PRs or submit to the Chrome Web Store.
permissions:
  contents: write

jobs:
  release:
    name: Validate and cut release
    runs-on: ubuntu-latest
    env:
      INTEROP_PHOTOS_ROOT: ${{ github.workspace }}/node_modules/.interop-photos
    steps:
      - name: Resolve release tag
        id: release
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          tag="${DISPATCH_TAG:-$GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "Release tag must be stable three-component semver with a v prefix, got $tag." >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Checkout release source
        uses: actions/checkout@v7
        with:
          ref: ${{ steps.release.outputs.tag }}
          fetch-depth: 0

      - name: Require tagged source to be on main
        env:
          TAG_NAME: ${{ steps.release.outputs.tag }}
        run: git merge-base --is-ancestor "$(git rev-list -n 1 "$TAG_NAME")" origin/main

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # npm ci replaces node_modules, so the pinned evidence checkout must follow it.
      - name: Checkout pinned Photos acceptance evidence
        uses: actions/checkout@v7
        with:
          repository: qwts/photos
          ref: d75346749046ca9ac337e4d987d0e4ad7fed1c8e
          path: node_modules/.interop-photos

      - name: Run required validation
        run: npm run ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Smoke-test hardened release build
        run: npm run test:e2e:release

      - name: Build and package release
        run: npm run package:release -- --tag "${{ steps.release.outputs.tag }}"

      - name: Create or refresh GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.release.outputs.tag }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" --prerelease
            gh release upload "$TAG_NAME" release/*.zip release/*.sha256 --clobber
          else
            gh release create "$TAG_NAME" release/*.zip release/*.sha256 \
              --verify-tag \
              --generate-notes \
              --prerelease \
              --title "Image Trail $TAG_NAME"
          fi
